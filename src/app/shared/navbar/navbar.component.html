<nav class="navbar-custom d-flex align-items-center justify-content-between px-3 px-sm-4">
    <div class="d-flex align-items-center gap-2">
        <button mat-icon-button (click)="onToggleSidebar()" class="d-md-none text-indigo-btn" aria-label="Toggle navigation menu">
            <mat-icon>menu</mat-icon>
        </button>
        <mat-icon class="text-indigo d-none d-md-inline-block">widgets</mat-icon>
        <span class="system-title font-weight-bold">{{ 'SYSTEM_NAME' | translate }}</span>
    </div>

    <div class="d-flex align-items-center gap-2 gap-sm-3">
        <!-- Theme Toggle -->
        <button mat-icon-button (click)="themeService.toggleTheme()" class="theme-toggle-btn">
            <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>

        <!-- Language Switcher -->
        <button mat-flat-button (click)="languageService.toggleLanguage()" class="lang-btn px-2 px-sm-3">
            <mat-icon class="me-sm-1">language</mat-icon>
            <span class="d-none d-sm-inline">{{ languageService.currentLang() === 'ar' ? 'English' : 'العربية' }}</span>
            <span class="d-inline d-sm-none">{{ languageService.currentLang() === 'ar' ? 'EN' : 'ع' }}</span>
        </button>

        <!-- User Info & Logout -->
        @if (authService.isAuthenticated()) {
        <div class="user-badge d-flex align-items-center gap-2 px-2 px-sm-3 py-1">
            <mat-icon class="user-icon">account_circle</mat-icon>
            <span class="user-name d-none d-md-inline">{{ 'NAVBAR.WELCOME' | translate }}{{ authService.currentUser() }}</span>
        </div>
        <button mat-stroked-button (click)="authService.logout()" class="logout-btn px-2 px-sm-3">
            <mat-icon class="me-sm-1">logout</mat-icon>
            <span class="d-none d-sm-inline">{{ 'NAVBAR.LOGOUT' | translate }}</span>
        </button>
        }
    </div>
</nav>
