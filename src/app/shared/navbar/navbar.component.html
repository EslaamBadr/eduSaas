<nav class="navbar-custom d-flex align-items-center justify-content-between px-4">
    <div class="d-flex align-items-center gap-2">
        <mat-icon class="text-indigo">widgets</mat-icon>
        <span class="system-title font-weight-bold">{{ 'SYSTEM_NAME' | translate }}</span>
    </div>

    <div class="d-flex align-items-center gap-3">
        <!-- Theme Toggle -->
        <button mat-icon-button (click)="themeService.toggleTheme()" class="theme-toggle-btn">
            <mat-icon>{{ themeService.isDarkMode() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>

        <!-- Language Switcher -->
        <button mat-flat-button (click)="languageService.toggleLanguage()" class="lang-btn">
            <mat-icon>language</mat-icon>
            {{ languageService.currentLang() === 'ar' ? 'English' : 'العربية' }}
        </button>

        <!-- User Info & Logout -->
        @if (authService.isAuthenticated()) {
        <div class="user-badge d-flex align-items-center gap-2 px-3 py-1">
            <mat-icon class="user-icon">account_circle</mat-icon>
            <span class="user-name">{{ 'NAVBAR.WELCOME' | translate }}{{ authService.currentUser() }}</span>
        </div>
        <button mat-stroked-button (click)="authService.logout()" class="logout-btn">
            <mat-icon class="mr-1">logout</mat-icon>
            {{ 'NAVBAR.LOGOUT' | translate }}
        </button>
        }
    </div>
</nav>
